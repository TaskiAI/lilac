name: Lilac
options:
  bundleIdPrefix: com.lilac
  deploymentTarget:
    iOS: "17.0"
targets:
  Lilac:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lilac.journal
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_CFBundleDisplayName: Lilac
        # DeepSeek key for the AI prompt engine. Resolved from the build
        # environment (env var / xcconfig) so it is never committed; unset
        # bakes in an empty value and the app runs offline on PromptBank.
        INFOPLIST_KEY_DEEPSEEK_API_KEY: "$(DEEPSEEK_API_KEY)"
        # Audio journaling: record voice notes and transcribe them to text.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Lilac records your spoken journal entries."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Lilac transcribes your recordings into text you can edit."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  LilacTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Lilac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
schemes:
  Lilac:
    build:
      targets:
        Lilac: all
    test:
      targets:
        - LilacTests
